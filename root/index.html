<!DOCTYPE html>
<html lang="en">	

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Food in Klamath</title>
	
	<!--
	Source - https://stackoverflow.com/a/35625707
	Posted by Michał Perłakowski, modified by community. See post 'Timeline' for change history
	Retrieved 2026-06-26, License - CC BY-SA 3.0
	-->
	<link rel="icon" href="images/burger_icon.png">

	<!-- leaflet assets -->
	<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
	<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
	
	<!-- box icon assets 											   -->
	<!-- acknowledgements: https://www.youtube.com/watch?v=fIR3isyFV8s -->
	<!-- link: https://boxicons.com/icons?free=true                    -->
	<link href='https://unpkg.com/boxicons@latest/css/boxicons.min.css' rel='stylesheet'>

	<!-- css ref -->
	<link rel="stylesheet" href="css/style.css">
</head>
<body>
	<!-- navbar -->
	<nav-bar></nav-bar>
	
	<!-- Main Stuff -->
	<div class="container" id="checkboxes">
		<div>
			<div id="map" width="100%" style="border:1px solid #ff8928;"></div> <br>
			<button id="randomButton" class="rand-button"><b>PICK FOR ME!</b></button>
			
			<h3 id="restaurant">Recommendation Will Appear Here...</h3>	
			
			<a href="#" target="_blank" id="address" rel="noopener noreferrer">
				Address Will Appear Here...		     
			</a>
		</div>
		<div>
			<h1 style="text-align: center;">FOOD FILTERS</h1>
			
			<div class="checkbox-grid">
				<!-- Country-Specific Food (alphabetized)-->	
				<label><input type="checkbox" name="American" id="American" value="American">American</label>
				<label><input type="checkbox" name="Asian" id="Asian" value="Asian">Asian</label>
				<label><input type="checkbox" name="Chinese" id="Chinese" value="Chinese">Chinese</label>
				<label><input type="checkbox" name="Greek" id="Greek" value="Greek">Greek</label>
				<label><input type="checkbox" name="Hawaiian" id="Hawaiian" value="Hawaiian">Hawaiian</label>
				<label><input type="checkbox" name="Italian" id="Italian" value="Italian">Italian</label>
				<label><input type="checkbox" name="Japanese" id="Japanese" value="Japanese">Japanese</label>
				<label><input type="checkbox" name="Mexican" id="Mexican" value="Mexican">Mexican</label>
				<label><input type="checkbox" name="Mongolian" id="Mongolian" value="Mongolian">Mongolian</label>
				<label><input type="checkbox" name="Thai" id="Thai" value="Thai">Thai</label>
				
				<!-- The Basics -->				
				<label><input type="checkbox" name="Pizza" id="Pizza" value="Pizza">Pizza</label>
				<label><input type="checkbox" name="Burgers" id="Burgers" value="Burgers">Burgers</label>
				<label><input type="checkbox" name="HotDogs" id="HotDogs" value="Hot Dogs">Hot Dogs</label>
				<label><input type="checkbox" name="Sandwiches" id="Sandwiches" value="Sandwiches">Sandwiches</label>
				<label><input type="checkbox" name="Chicken" id="Chicken" value="Chicken">Chicken</label>
				<label><input type="checkbox" name="Sushi" id="Sushi" value="Sushi">Sushi</label>
				<label><input type="checkbox" name="Seafood" id="Seafood" value="Seafood">Seafood</label>
				
				<!-- Breakfast Food -->	
				<label><input type="checkbox" name="Breakfast" id="Breakfast" value="Breakfast">Breakfast</label>
				<label><input type="checkbox" name="Brunch" id="Brunch" value="Brunch">Brunch</label>
				<label><input type="checkbox" name="Pastries" id="Pastries" value="Pastries">Pastries</label>
				
				<!-- Vegan and Misc. -->	
				<label><input type="checkbox" name="Vegan" id="Vegan" value="Vegan">Vegan</label>
				<label><input type="checkbox" name="Salad" id="Salad" value="Salad">Salad</label>
				<label><input type="checkbox" name="Noodles" id="Noodles" value="Noodles">Noodles</label>
				
				<!-- Carnivore -->
				<label><input type="checkbox" name="BBQ" id="BBQ" value="BBQ">BBQ</label>
				<label><input type="checkbox" name="Steakhouse" id="Steakhouse" value="Steakhouse">Steakhouse</label>
				
				<!-- Non-Food Genres -->
				<label><input type="checkbox" name="SportsBar" id="SportsBar" value="Sports Bar Food">Sports Bar Food</label>
				<label><input type="checkbox" name="FoodTruck" id="FoodTruck" value="Food Truck">Food Truck</label>
				<label><input type="checkbox" name="Deli" id="Deli" value="Deli Food">Deli Food</label>
		</div>
		
		<div>
			<h1 style="text-align: center;">"VIBE" FILTERS</h1>
			
			<div class="checkbox-grid">
				<label><input type="checkbox" name="Casual" id="Casual" value="Casual">Casual</label>
				<label><input type="checkbox" name="Contemporary" id="Contemporary" value="Contemporary">Contemporary</label>
				<label><input type="checkbox" name="Dancing" id="Dancing" value="Dancing">Dancing</label>
				<label><input type="checkbox" name="Diner" id="Diner" value="Diner">Diner</label>
				<label><input type="checkbox" name="Fine-Dining" id="Fine-Dining" value="Fine-Dining">Fine-Dining</label>
				<label><input type="checkbox" name="DriveThru" id="DriveThru" value="Drive Thru">Drive Thru</label>
				<label><input type="checkbox" name="Lively" id="Lively" value="Lively">Lively</label>
				<label><input type="checkbox" name="Outdoor" id="Outdoor" value="Outdoor">Outdoor</label>
				<label><input type="checkbox" name="Pickup" id="Pickup" value="Pickup">Pickup</label>
				<label><input type="checkbox" name="Pub" id="Pub" value="Pub">Pub</label>
				<label><input type="checkbox" name="Speakeasy" id="Speakeasy" value="Speakeasy">Speakeasy</label>
				<label><input type="checkbox" name="Thematic" id="Thematic" value="Thematic">Thematic</label>
			</div>
		</div>
	</div>
	
	<script type="module" src="js/script.js"></script>
	<script type="module" src="js/navbar.js"></script>
</body>
</html>
