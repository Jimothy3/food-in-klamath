<!DOCTYPE html>
<html lang="en">	

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Food in Klamath</title>
	
	<!--
	Source - https://stackoverflow.com/a/35625707

	Retrieved 2026-06-26, License - CC BY-SA 3.0
	-->
	<link rel="icon" href="images/burger_icon.png">

	<!-- leaflet assets -->
	<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
	<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
	
	<!-- box icon assets 											   -->
	<!-- acknowledgements: https://www.youtube.com/watch?v=fIR3isyFV8s -->
	<!-- link: https://boxicons.com/icons?free=true                    -->
	<link href='https://unpkg.com/boxicons@latest/css/boxicons.min.css' rel='stylesheet'>

	<!-- css ref -->
	<link rel="stylesheet" href="css/style.css">
</head>
<body>
	<!-- navbar -->
	<nav-bar></nav-bar>
	
	<!-- Main Stuff -->
	<div class="container">
		<div>
			<div id="map" width="100%" style="border:1px solid #ff8928;"></div> <br>
			<button id="randomButton" class="rand-button"><b>PICK FOR ME!</b></button>
			
			<h3 id="restaurant">Recommendation Will Appear Here...</h3>	
			
			<a href="#" target="_blank" id="address" rel="noopener noreferrer">
				Address Will Appear Here...		     
			</a>
		</div>
		<div>
			<h1 style="text-align: center;">FOOD FILTERS</h1>
			
			<div class="checkbox-grid">
				<!-- Country-Specific Food (alphabetized)-->	
				<label><input type="checkbox" name="American" id="American">American</label>
				<label><input type="checkbox" name="Asian" id="Asian">Asian</label>
				<label><input type="checkbox" name="Chinese" id="Chinese">Chinese</label>
				<label><input type="checkbox" name="Greek" id="Greek">Greek</label>
				<label><input type="checkbox" name="Hawaiian" id="Hawaiian">Hawaiian</label>
				<label><input type="checkbox" name="Italian" id="Italian">Italian</label>
				<label><input type="checkbox" name="Japanese" id="Japanese">Japanese</label>
				<label><input type="checkbox" name="Mexican" id="Mexican">Mexican</label>
				<label><input type="checkbox" name="Mongolian" id="Mongolian">Mongolian</label>
				<label><input type="checkbox" name="Thai" id="Thai">Thai</label>
				
				<!-- The Basics -->				
				<label><input type="checkbox" name="Pizza" id="Pizza">Pizza</label>
				<label><input type="checkbox" name="Burgers" id="Burgers">Burgers</label>
				<label><input type="checkbox" name="HotDogs" id="HotDogs">Hot Dogs</label>
				<label><input type="checkbox" name="Sandwiches" id="Sandwiches">Sandwiches</label>
				<label><input type="checkbox" name="Chicken" id="Chicken">Chicken</label>
				<label><input type="checkbox" name="Sushi" id="Sushi">Sushi</label>
				<label><input type="checkbox" name="Seafood" id="Seafood">Seafood</label>
				
				<!-- Breakfast Food -->	
				<label><input type="checkbox" name="Breakfast" id="Breakfast">Breakfast</label>
				<label><input type="checkbox" name="Brunch" id="Brunch">Brunch</label>
				<label><input type="checkbox" name="Pastries" id="Pastries">Pastries</label>
				
				<!-- Vegan and Misc. -->	
				<label><input type="checkbox" name="Vegan" id="Vegan">Vegan</label>
				<label><input type="checkbox" name="Salad" id="Salad">Salad</label>
				<label><input type="checkbox" name="Noodles" id="Noodles">Noodles</label>
				
				<!-- Carnivore -->
				<label><input type="checkbox" name="BBQ" id="BBQ">BBQ</label>
				<label><input type="checkbox" name="Steakhouse" id="Steakhouse">Steakhouse</label>
				
				<!-- Non-Food Genres -->
				<label><input type="checkbox" name="SportsBar" id="SportsBar">Sports Bar Food</label>
				<label><input type="checkbox" name="FoodTruck" id="FoodTruck">Food Truck</label>
				<label><input type="checkbox" name="Deli" id="Deli">Deli Food</label>	
		</div>
		
		<div>
			<h1 style="text-align: center;">"VIBE" FILTERS</h1>
			
			<div class="checkbox-grid">
				<label><input type="checkbox" name="Casual" id="Casual">Casual</label>
				<label><input type="checkbox" name="Casual" id="Casual">Contemporary</label>
				<label><input type="checkbox" name="Casual" id="Casual">Dancing</label>
				<label><input type="checkbox" name="Casual" id="Casual">Diner</label>
				<label><input type="checkbox" name="Casual" id="Casual">Fine-Dining</label>
				<label><input type="checkbox" name="Casual" id="Casual">Drive Thru</label>
				<label><input type="checkbox" name="Casual" id="Casual">Lively</label>
				<label><input type="checkbox" name="Casual" id="Casual">Outdoor</label>
				<label><input type="checkbox" name="Casual" id="Casual">Pickup</label>
				<label><input type="checkbox" name="Casual" id="Casual">Pub</label>
				<label><input type="checkbox" name="Casual" id="Casual">Speakeasy</label>
				<label><input type="checkbox" name="Casual" id="Casual">Thematic</label>
			</div>
		</div>
	</div>
	
	<script type="module" src="js/script.js"></script>
	<script type="module" src="js/navbar.js"></script>
</body>
</html>
